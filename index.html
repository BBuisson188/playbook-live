<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#07111f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Playbook Live" />
    <title>Playbook Live</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="app-header">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true">PL</div>
          <div>
            <div class="eyebrow">Basketball play designer</div>
            <h1>Playbook Live</h1>
          </div>
        </div>
        <div class="header-actions">
          <button class="icon-button" id="undoBtn" title="Undo" aria-label="Undo">â†¶</button>
          <button class="icon-button" id="redoBtn" title="Redo" aria-label="Redo">â†·</button>
          <button class="icon-button" id="settingsBtn" title="Settings" aria-label="Settings">âš™</button>
        </div>
      </header>

      <main class="screen-stack">
        <section id="createScreen" class="screen active" aria-label="Editor">
          <div class="workspace-card">
            <div class="workspace-topbar">
              <div class="play-title-wrap">
                <label for="playName">Play name</label>
                <input id="playName" class="play-name-input" type="text" spellcheck="false" />
              </div>
              <div class="step-chip" id="stepChip">Step 1 of 1</div>
            </div>

            <div class="court-wrap">
              <svg id="courtSvg" class="court-svg" viewBox="0 0 600 900" role="img" aria-label="Basketball court editor"></svg>
              <div id="courtChooser" class="court-chooser hidden" aria-label="Choose court type">
                <div class="court-choice-title">Choose court</div>
                <div class="court-choice-actions">
                  <button class="court-choice-button" data-court-type="half" type="button">
                    <span>Half</span>
                    <img src="assets/half-court.png" alt="" />
                  </button>
                  <button class="court-choice-button" data-court-type="full" type="button">
                    <span>Full</span>
                    <img src="assets/full-court.png" alt="" />
                  </button>
                </div>
              </div>
              <div id="toast" class="toast hidden"></div>
            </div>

            <div class="editor-footer">
              <div class="step-controls" aria-label="Step controls">
                <button id="prevStepBtn" class="pill-button secondary">â€¹ Step</button>
                <button id="nextStepBtn" class="pill-button primary">Next Step</button>
                <button id="addBlankStepBtn" class="pill-button secondary">Blank</button>
              </div>
              <div class="quick-actions">
                <button id="savePlayBtn" class="pill-button success">Save</button>
              </div>
            </div>
          </div>

          <aside class="tool-dock" aria-label="Drawing tools">
            <button class="tool-button active" data-tool="select"><span>â†–</span><b>Select</b></button>
            <button class="tool-button" data-tool="offense"><span class="mini-player offense">1</span><b>Offense</b></button>
            <button class="tool-button" data-tool="defense"><span class="mini-player defense">1</span><b>Defense</b></button>
            <button class="tool-button" data-tool="ball"><span class="mini-ball"></span><b>Ball</b></button>
            <button class="tool-button" data-tool="move"><span class="line-sample move"></span><b>Cut</b></button>
            <button class="tool-button" data-tool="pass"><span class="line-sample pass"></span><b>Pass</b></button>
            <button class="tool-button" data-tool="dribble"><span class="line-sample dribble"></span><b>Dribble</b></button>
            <button class="tool-button" data-tool="screen"><span class="line-sample screen"></span><b>Screen</b></button>
            <button class="tool-button" data-tool="erase"><span>âŒ«</span><b>Erase</b></button>
          </aside>
        </section>

        <section id="playbookScreen" class="screen" aria-label="Playbook library">
          <div class="library-layout">
            <div class="library-header card-panel">
              <div>
                <div class="eyebrow">Saved locally on this device</div>
                <h2>Playbook</h2>
              </div>
              <button id="newPlayBtn" class="pill-button primary">New Play</button>
            </div>
            <div class="library-actions card-panel">
              <button id="saveGitHubBtn" class="pill-button success">Save to GitHub</button>
              <button id="loadGitHubBtn" class="pill-button secondary">Load from GitHub</button>
              <button id="exportPlaybookBtn" class="pill-button secondary">Export Playbook</button>
            </div>
            <div id="playList" class="play-list"></div>
          </div>
        </section>

        <section id="reviewScreen" class="screen" aria-label="Review play">
          <div class="review-card">
            <div class="court-wrap review-court-wrap">
              <svg id="reviewSvg" class="court-svg" viewBox="0 0 600 900" role="img" aria-label="Animated play review"></svg>
              <button id="fullscreenBtn" class="fullscreen-button" type="button" title="Full screen" aria-label="Full screen">â›¶</button>
            </div>
            <div class="review-controls">
              <button id="reviewBackBtn" class="icon-button large">â€¹</button>
              <button id="playPauseBtn" class="play-button">â–¶</button>
              <button id="reviewForwardBtn" class="icon-button large">â€º</button>
              <button id="restartBtn" class="pill-button secondary">Restart</button>
              <label class="speed-control">Speed
                <input id="speedSlider" type="range" min="0.5" max="2" value="1" step="0.25" />
              </label>
            </div>
          </div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="Main navigation">
        <button class="nav-button active" data-screen="create"><span>âœŽ</span>Editor</button>
        <button class="nav-button" data-screen="playbook"><span>â–¦</span>Playbook</button>
        <button class="nav-button" data-screen="review"><span>â–¶</span>Review</button>
      </nav>
    </div>

    <dialog id="settingsDialog" class="modal-card">
      <form method="dialog">
        <div class="modal-header">
          <div>
            <div class="eyebrow">Manual cloud sync</div>
            <h2>GitHub Settings</h2>
          </div>
          <button class="icon-button" value="cancel">Ã—</button>
        </div>
        <p class="muted">For personal use, create a fine-grained GitHub token with Contents read/write access to this repository. The token is stored only in this browser.</p>
        <div class="settings-grid">
          <label>Owner<input id="ghOwner" autocomplete="off" placeholder="BBuisson188" /></label>
          <label>Repository<input id="ghRepo" autocomplete="off" placeholder="playbook-live" /></label>
          <label>Branch<input id="ghBranch" autocomplete="off" placeholder="main" /></label>
          <label>File path<input id="ghPath" autocomplete="off" placeholder="data/playbook-live.json" /></label>
          <label class="full-width">Token<input id="ghToken" type="password" autocomplete="off" placeholder="github_pat_..." /></label>
        </div>
        <div class="modal-actions">
          <button id="clearGitHubBtn" type="button" class="pill-button danger">Clear</button>
          <button id="saveSettingsBtn" type="button" class="pill-button primary">Save Settings</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
